<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post & In — Seattle Ice Hockey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;1,700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', system-ui, sans-serif;
  background: #0D1B2A;
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(48px, 10vw, 96px);
  font-weight: 800;
  font-style: italic;
  letter-spacing: -1px;
  line-height: 1;
  text-align: center;
  margin-bottom: 0.25em;
}
.logo span { color: #E63946; }

.tagline {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-bottom: 4rem;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}

.nav-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: background 0.15s, border-color 0.15s;
}
.nav-link:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
}
.nav-link .badge {
  font-size: 10px;
  font-weight: 600;
  font-family: 'Barlow', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 10px;
  background: #E63946;
  color: white;
}
.nav-link.coming-soon {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}
.nav-link.coming-soon .badge {
  background: rgba(255,255,255,0.15);
}

footer {
  margin-top: 4rem;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="logo">Post <span>&</span> In</div>
<p class="tagline">Seattle Area Ice Hockey</p>

<nav class="nav">
  <a class="nav-link" href="/stick-and-puck/">
    <span>Stick &amp; Puck</span>
    <span class="badge">Live</span>
  </a>
  <a class="nav-link coming-soon" href="#">
    <span>Open Skate</span>
    <span class="badge">Soon</span>
  </a>
  <a class="nav-link coming-soon" href="#">
    <span>Drop-in Hockey</span>
    <span class="badge">Soon</span>
  </a>
</nav>

<footer>postandin.com &nbsp;·&nbsp; not affiliated with any venue</footer>

</body>
</html>
