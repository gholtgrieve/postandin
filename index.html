<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post & In — Seattle Ice Hockey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #0A0A0A;
  --black-2: #111111;
  --black-3: #1A1A1A;
  --white:   #E8E4DC;
  --white-2: #C8C4BC;
  --white-3: #989490;
  --yellow:  #F0D44A;
  --red:     #CC2200;
  --red-lt:  #E83318;
}

html, body { height: 100%; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background-color: var(--black);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  /* Halftone dots */
  background-image: radial-gradient(circle, #1e1e1e 1px, transparent 1px);
  background-size: 24px 24px;
}

.container {
  width: 100%;
  max-width: 440px;
}

/* Top rule */
.top-rule {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 2.5rem;
}
.top-rule-line {
  flex: 1;
  height: 2px;
  background: var(--yellow);
}
.top-rule-center {
  width: 8px;
  height: 8px;
  background: var(--yellow);
  transform: rotate(45deg);
  margin: 0 12px;
  flex-shrink: 0;
}

/* Logo */
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 18vw, 112px);
  letter-spacing: 0.04em;
  line-height: 0.88;
  margin-bottom: 0;
}
.logo-post { color: var(--white); display: block; }
.logo-amp  { color: var(--yellow); display: block; font-size: 0.65em; line-height: 0.9; }
.logo-in   { color: var(--white); display: block; }

/* Tagline */
.tagline {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--white-3);
  margin-top: 12px;
  margin-bottom: 2.5rem;
  border-left: 2px solid var(--red);
  padding-left: 12px;
}

/* Nav */
.nav {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid #2A2A2A;
  margin-bottom: 2rem;
}

.nav-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--black-2);
  border-bottom: 1px solid #2A2A2A;
  text-decoration: none;
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.08em;
  transition: background 0.1s;
  border-left: 3px solid transparent;
}
.nav-link:last-child { border-bottom: none; }
.nav-link:hover { background: var(--black-3); border-left-color: var(--yellow); }
.nav-link.coming-soon {
  opacity: 0.3;
  pointer-events: none;
}

.nav-link-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.18em;
  padding: 3px 8px;
  border: 1px solid var(--yellow);
  color: var(--yellow);
}
.nav-link.coming-soon .badge {
  border-color: #333;
  color: #555;
}
.nav-arrow {
  font-size: 16px;
  color: var(--yellow);
  opacity: 0.7;
}

/* Live dot */
.live-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--red-lt);
  margin-right: 4px;
  vertical-align: middle;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Bottom rule */
.bottom-rule {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #333;
  display: flex;
  align-items: center;
  gap: 12px;
}
.bottom-rule::before,
.bottom-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #222;
}
.bottom-rule a { color: #444; text-decoration: none; }
.bottom-rule a:hover { color: var(--yellow); }
</style>
</head>
<body>

<div class="container">

  <div class="top-rule">
    <div class="top-rule-line"></div>
    <div class="top-rule-center"></div>
    <div class="top-rule-line"></div>
  </div>

  <div class="logo">
    <span class="logo-post">Post</span>
    <span class="logo-amp">&amp;</span>
    <span class="logo-in">In</span>
  </div>

  <p class="tagline">Seattle Area Ice Hockey</p>

  <nav class="nav">
    <a class="nav-link" href="/stick-and-puck/">
      <span><span class="live-dot"></span>Stick &amp; Puck</span>
      <span class="nav-link-right">
        <span class="badge">Live</span>
        <span class="nav-arrow">→</span>
      </span>
    </a>
    <a class="nav-link coming-soon" href="#">
      <span>Open Skate</span>
      <span class="nav-link-right">
        <span class="badge">Soon</span>
      </span>
    </a>
    <a class="nav-link coming-soon" href="#">
      <span>Drop-in Hockey</span>
      <span class="nav-link-right">
        <span class="badge">Soon</span>
      </span>
    </a>
  </nav>

  <div class="bottom-rule">
    <a href="https://github.com/gholtgrieve/postandin">postandin.com</a>
  </div>

</div>

</body>
</html>
