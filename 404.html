<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Page Not Found — Post &amp; In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:    #E8E3D8;
  --panel:    #EFEBE2;
  --rule:     #B8B2A4;
  --ink:      #141210;
  --ink3:     #6E6A61;
  --mustard:  #9A7B00;
  --mustard2: #7C6300;
}

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.site-header {
  background: var(--ink);
  border-bottom: 1px solid rgba(184,178,164,0.12);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 clamp(1rem, 4vw, 2rem);
  height: 52px;
  display: flex;
  align-items: center;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.08em;
  color: var(--paper);
}
.logo a { color: inherit; text-decoration: none; }

main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(3rem, 10vw, 6rem) clamp(1rem, 4vw, 2rem);
}
.not-found { max-width: 480px; }

.code {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 14px;
}
.not-found h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(44px, 9vw, 72px);
  letter-spacing: 0.04em;
  line-height: 0.94;
  color: var(--ink);
  margin-bottom: 18px;
}
.rule { height: 1px; background: var(--mustard); margin-bottom: 18px; }
.not-found p {
  font-size: 13px;
  letter-spacing: 0.02em;
  line-height: 1.9;
  color: var(--ink3);
  margin-bottom: 28px;
}

.links { display: flex; flex-wrap: wrap; gap: 2px; background: var(--rule); }
.links a {
  background: var(--panel);
  padding: 14px 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mustard);
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: border-color 0.1s, color 0.1s;
}
.links a::after { content: ' →'; }
.links a:hover { border-left-color: var(--mustard); color: var(--mustard2); }

footer {
  background: var(--ink);
  border-top: 2px solid var(--mustard);
  color: var(--ink3);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-align: center;
  padding: 16px;
  margin-top: auto;
}
footer a { color: var(--rule); text-decoration: none; }
footer a:hover { color: var(--mustard); }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <a href="/">Post &amp; In</a>
    </div>
  </div>
</header>

<main>
  <div class="not-found">
    <div class="code">Error 404</div>
    <h1>Page Not<br>Found</h1>
    <div class="rule"></div>
    <p>That page doesn't exist. It may have moved, or the link may have a typo.</p>
    <div class="links">
      <a href="/">Home</a>
      <a href="/stick-and-puck/">Stick &amp; Puck</a>
    </div>
  </div>
</main>

<footer>
  postandin.com &nbsp;·&nbsp; <a href="/stick-and-puck/">Stick &amp; Puck</a>
</footer>

</body>
</html>
