[build]
  publish = "."
  functions = "netlify/functions"

# FareHarbor proxy
[[redirects]]
  from = "/api/fareharbor"
  to = "/.netlify/functions/fareharbor"
  status = 200

# Kent Valley proxy
[[redirects]]
  from = "/api/kentvalley"
  to = "/.netlify/functions/kentvalley"
  status = 200

# Redirect /stick-and-puck (no trailing slash) to folder
[[redirects]]
  from = "/stick-and-puck"
  to = "/stick-and-puck/"
  status = 301
